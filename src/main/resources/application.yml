spring:
  application:
    name: composebean

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/composebean?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true