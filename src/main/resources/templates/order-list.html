<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compose Bean | 주문 조회</title>
    <link rel="stylesheet" th:href="@{/css/composebean.css}">
</head>
<body>
<div class="page-shell order-list-page">
    <header class="site-header">
        <a class="header-icon" th:href="@{/}" aria-label="홈">⌂</a>
        <h1 class="page-title">주문 조회</h1>
        <a class="header-icon" th:href="@{/admin/products}" aria-label="상품 관리">▧</a>
    </header>

    <main>
        <form class="wide-search" method="get" th:action="@{/orders}">
            <input name="email" type="email" placeholder="이메일로 내 주문 찾기" th:value="${email}">
            <button type="submit" class="dark-button">⌕ 검색</button>
        </form>

        <p class="inline-message" th:if="${#lists.isEmpty(orders)}">
            주문 조회 기능이 연결되면 이곳에 주문 목록이 표시됩니다.
        </p>

        <section class="order-grid">
            <a class="order-card" th:each="order : ${orders}" th:href="@{/receipt/{id}(id=${order.id})}">
                <div class="order-card-title">
                    <strong th:text="|주문 #${order.id}|">주문 #15</strong>
                    <span class="status-badge" th:text="${order.deliveryStatus}">배송 중</span>
                </div>
                <time th:text="${#temporals.format(order.orderedAt, 'yyyy-MM-dd HH:mm')}">2026-07-16 13:30</time>
                <dl>
                    <dt>주문자</dt><dd th:text="${order.email}">customer@example.com</dd>
                    <dt>배송 예정일</dt><dd th:text="${order.deliveryExpectedDate}">2026-07-17</dd>
                    <dt>결제 상태</dt><dd th:text="${order.paymentStatus}">완료</dd>
                    <dt>총금액</dt><dd th:text="|${#numbers.formatInteger(order.totalPrice, 0, 'COMMA')}원|">0원</dd>
                </dl>
            </a>
        </section>
    </main>
</div>
</body>
</html>
